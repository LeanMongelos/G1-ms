# ============================================================
#  Configuracion del backend Novatech Store
#  (cada linea esta explicada para que se entienda que hace)
# ============================================================

# Nombre de la aplicacion (aparece en los logs).
spring.application.name=novatech-backend

# Puerto donde va a escuchar el backend. Se entra por http://localhost:8080
server.port=8080

# ============================================================
#  BASE DE DATOS MySQL
# ============================================================
# url: direccion de la base. localhost:3306 es donde corre MySQL.
#   novatech_store -> nombre de la base de datos.
#   createDatabaseIfNotExist=true -> si la base no existe, la crea sola.
#   useUnicode y characterEncoding=UTF-8 -> para que acepte acentos y caracteres especiales.
# NOTA para deploy: la sintaxis ${VARIABLE:valorPorDefecto} significa que toma el
# valor de una "variable de entorno" si existe (util en un servidor/Docker), y si no,
# usa el valor por defecto que sirve para correr en tu maquina local.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/novatech_store?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Argentina/Buenos_Aires}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Usuario de MySQL (por defecto root).
spring.datasource.username=${DB_USER:root}
# Contrasena de MySQL (por defecto la de tu maquina local).
spring.datasource.password=${DB_PASSWORD:root}

# ===== JPA / Hibernate (el que crea y maneja las tablas) =====
# ddl-auto=update -> Hibernate mira nuestras entidades y crea o actualiza las tablas solo.
spring.jpa.hibernate.ddl-auto=update
# show-sql=true -> muestra en la consola las consultas SQL que se ejecutan (sirve para aprender/depurar).
spring.jpa.show-sql=true
# format_sql=true -> muestra ese SQL ordenado y prolijo.
spring.jpa.properties.hibernate.format_sql=true
# open-in-view=false -> buena practica para evitar problemas de conexiones abiertas de mas.
spring.jpa.open-in-view=false

# ===== CORS (permiso para que el frontend nos llame) =====
# En desarrollo solo localhost. En prod definir CORS_ORIGINS con la URL exacta del frontend.
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

# ===== JWT (sesion HttpOnly — NO guardar en localStorage) =====
app.jwt.secret=${JWT_SECRET:dev-only-cambiar-en-produccion-novatech-2026-secreto-largo}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.security.cookie-secure=${COOKIE_SECURE:false}

# ===== Datos de ejemplo (data.sql) =====
# defer-datasource-initialization=true -> espera a que se creen las tablas antes de cargar los datos.
spring.jpa.defer-datasource-initialization=true
# sql.init.mode=always -> siempre ejecuta el archivo data.sql al arrancar.
spring.sql.init.mode=always

# ============================================================
#  Configuracion del backend Novatech Store
#  (cada linea esta explicada para que se entienda que hace)
# ============================================================

# Nombre de la aplicacion (aparece en los logs).
spring.application.name=novatech-backend

# Puerto donde va a escuchar el backend. Se entra por http://localhost:8080
server.port=8080

# ============================================================
#  BASE DE DATOS H2 (para DESARROLLO)
#  H2 es una base que vive en la memoria de la app: no hay que
#  instalar nada y se crea sola cada vez que arrancamos.
# ============================================================
# url: base en memoria llamada "novatech".
#   MODE=MySQL -> hace que H2 se comporte parecido a MySQL.
#   DATABASE_TO_LOWER y CASE_INSENSITIVE_IDENTIFIERS -> evitan problemas de mayusculas/minusculas en los nombres.
#   DB_CLOSE_DELAY=-1 -> mantiene la base viva mientras la app este prendida.
spring.datasource.url=jdbc:h2:mem:novatech;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola web de H2 para mirar la base con el navegador: http://localhost:8080/h2-console
# (usar el mismo JDBC URL de arriba, usuario "sa" y sin contrasena)
spring.h2.console.enabled=true

# ============================================================
#  BASE DE DATOS MySQL (para mas adelante / produccion)
#  Cuando queramos usar MySQL, comentamos el bloque de H2 de arriba
#  y descomentamos estas lineas.
# ============================================================
#spring.datasource.url=jdbc:mysql://localhost:3306/novatech_store?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Argentina/Buenos_Aires
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.username=root
#spring.datasource.password=root

# ===== JPA / Hibernate (el que crea y maneja las tablas) =====
# ddl-auto=update -> Hibernate mira nuestras entidades y crea o actualiza las tablas solo.
spring.jpa.hibernate.ddl-auto=update
# show-sql=true -> muestra en la consola las consultas SQL que se ejecutan (sirve para aprender/depurar).
spring.jpa.show-sql=true
# format_sql=true -> muestra ese SQL ordenado y prolijo.
spring.jpa.properties.hibernate.format_sql=true
# open-in-view=false -> buena practica para evitar problemas de conexiones abiertas de mas.
spring.jpa.open-in-view=false

# ===== Datos de ejemplo (data.sql) =====
# defer-datasource-initialization=true -> espera a que se creen las tablas antes de cargar los datos.
spring.jpa.defer-datasource-initialization=true
# sql.init.mode=always -> siempre ejecuta el archivo data.sql al arrancar.
spring.sql.init.mode=always

# ============================================================
#  NovaTech ERP — Perfil de producción
#  Activar: SPRING_PROFILES_ACTIVE=prod
# ============================================================

spring.application.name=novatech-backend
server.port=${SERVER_PORT:8080}

# --- Base de datos MySQL (obligatorio en prod) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# --- JWT / cookies (obligatorio en prod) ---
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.security.cookie-secure=true

# --- CORS: URL exacta del frontend (separar por coma si hay varias) ---
app.cors.allowed-origins=${CORS_ORIGINS:https://app.novatech.local}

# --- Datos de ejemplo: NO ejecutar en producción ---
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# --- Logging ---
logging.level.root=WARN
logging.level.com.novatech=INFO

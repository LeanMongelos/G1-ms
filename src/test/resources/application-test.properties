spring.application.name=novatech-backend-test

spring.datasource.url=jdbc:h2:mem:novatech_smoke;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=never

app.jwt.secret=test-jwt-secret-novatech-smoke-suite-2026-min-32-chars
app.jwt.expiration-ms=86400000
app.security.cookie-secure=false
app.cors.allowed-origins=http://localhost:4200

logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN
